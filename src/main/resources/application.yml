spring:
  application:
    name: crime-info-service
  profiles:
    active: dev
  data:
    mongodb:
      uri: mongodb://localhost:27017/crime_info_service
  graphql:
    graphiql:
      enabled: false
    schema:
      locations: classpath:graphql/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

info:
  app:
    name: crime-info-service
    version: 0.0.1-SNAPSHOT
